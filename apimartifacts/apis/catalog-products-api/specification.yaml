openapi: 3.0.1
info:
  title: Catalog - Products
  description: Product catalog API. Managed by team-catalog.
  version: '1.0'
servers:
  - url: https://apim-networked-a.azure-api.net/catalog/products
paths:
  /products:
    get:
      summary: List products
      operationId: list-products
      responses:
        '200':
          description: ''
  '/products/{id}':
    get:
      summary: Get product
      operationId: get-product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ''
components:
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      name: Ocp-Apim-Subscription-Key
      in: header
    apiKeyQuery:
      type: apiKey
      name: subscription-key
      in: query
security:
  - apiKeyHeader: [ ]
  - apiKeyQuery: [ ]