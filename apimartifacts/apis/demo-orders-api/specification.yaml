openapi: 3.0.1
info:
  title: Demo - Orders API (Pro only)
  description: Premium API assigned only to the demo-pro product. Demonstrates Product-scope rate limiting and per-operation throttling per subscription key.
  version: '1.0'
servers:
  - url: https://apim-networked-a.azure-api.net/demo/orders
paths:
  /:
    get:
      summary: List orders
      operationId: list-orders
      responses:
        '200':
          description: ''
    post:
      summary: Create order
      operationId: create-order
      responses:
        '200':
          description: ''
components:
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      name: Ocp-Apim-Subscription-Key
      in: header
    apiKeyQuery:
      type: apiKey
      name: subscription-key
      in: query
security:
  - apiKeyHeader: [ ]
  - apiKeyQuery: [ ]