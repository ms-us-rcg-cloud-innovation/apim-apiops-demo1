name: Run APIOps Extractor

on:
  workflow_dispatch:

env:
  APIOPS_RELEASE: v7.0.1
  ARTIFACTS_DIR: apimartifacts

jobs:
  extract:
    runs-on: [self-hosted, apim-vnet]
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download extractor
        run: |
          curl -fsSLo extractor.zip https://github.com/Azure/apiops/releases/download/${APIOPS_RELEASE}/extractor-linux-x64.zip
          python3 -m zipfile -e extractor.zip .
          chmod +x extractor

      - name: Run extractor
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP_NAME: ${{ secrets.APIM_RG }}
          API_MANAGEMENT_SERVICE_NAME: ${{ secrets.APIM_NAME }}
          API_MANAGEMENT_SERVICE_OUTPUT_FOLDER_PATH: ${{ github.workspace }}/${{ env.ARTIFACTS_DIR }}
        run: ./extractor

      - name: Create PR with extracted artifacts
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(apiops): extracted APIM state"
          branch: apiops/extract-${{ github.run_id }}
          title: "APIOps extract: latest APIM state"
          body: |
            Automated extract from `${{ secrets.APIM_NAME }}`.
            Review the diff carefully — CODEOWNERS will gate per team.
          add-paths: |
            ${{ env.ARTIFACTS_DIR }}/**
