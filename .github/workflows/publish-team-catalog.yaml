name: Publish team-catalog

on:
  push:
    branches: [main]
    paths:
      - 'apimartifacts/apis/catalog-products-api/**'
      - 'apimartifacts/apis/catalog-weather-api/**'
      - 'apimartifacts/products/team-catalog/**'
      - 'apimartifacts/named values/catalog-*/**'
      - 'apimartifacts/backends/backend-catalog-*/**'
      - 'configurations/configuration.team-catalog.yaml'
      - 'specs/catalog-*.openapi.yaml'
  workflow_dispatch:

env:
  APIOPS_RELEASE: v6.0.1.3
  ARTIFACTS_DIR: apimartifacts
  CONFIG_FILE: configurations/configuration.team-catalog.yaml

jobs:
  publish:
    runs-on: [self-hosted, apim-vnet]
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download publisher
        run: |
          curl -sSLo publisher https://github.com/Azure/apiops/releases/download/${APIOPS_RELEASE}/publisher.linux-x64
          chmod +x publisher

      - name: Run publisher
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP_NAME: ${{ secrets.APIM_RG }}
          API_MANAGEMENT_SERVICE_NAME: ${{ secrets.APIM_NAME }}
          API_MANAGEMENT_SERVICE_OUTPUT_FOLDER_PATH: ${{ github.workspace }}/${{ env.ARTIFACTS_DIR }}
          CONFIGURATION_YAML_PATH: ${{ github.workspace }}/${{ env.CONFIG_FILE }}
        run: ./publisher
